name: distro_link
description: "DistroLink — distributor order-taking app."
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.11.5

dependencies:
  connectivity_plus: ^7.1.1
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  equatable: ^2.0.8
  excel: ^4.0.6
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.0.0
  freezed_annotation: ^3.1.0
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  go_router: ^17.2.2
  google_fonts: ^8.1.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  intl: ^0.20.2
  json_annotation: ^4.11.0
  logger: ^2.7.0
  path_provider: ^2.1.5
  pdf: ^3.10.8
  permission_handler: ^12.0.1
  reactive_forms: ^18.2.2
  riverpod_annotation: ^4.0.2
  share_plus: ^10.1.4
  shared_preferences: ^2.5.5
  supabase_flutter: ^2.12.4
  uuid: ^4.5.3

dev_dependencies:
  build_runner: ^2.15.0

  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  mocktail: ^1.0.5
  riverpod_generator: ^4.0.3
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path_android: "assets/icons/icon_light_1024.png"
  image_path_ios: "assets/icons/icon_light_1024.png"
  adaptive_icon_background: "#EFF6FF"
  adaptive_icon_foreground: "assets/icons/icon_light_1024.png"
